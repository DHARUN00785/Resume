<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        input {
            width: 95%;
            padding: 8px;
        }

        button {
            padding: 8px 15px;
            margin: 3px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .add-btn {
            background-color: #4CAF50;
        }

        .edit-btn {
            background-color: #2196F3;
        }

        .delete-btn {
            background-color: #f44336;
        }
    </style>
</head>
<body>

<h2>Student Management System</h2>

<!-- Top Table - Form -->
<table>
    <tr>
        <th colspan="2">Student Form</th>
    </tr>
    <tr>
        <td>Student ID</td>
        <td><input type="text" id="sid"></td>
    </tr>
    <tr>
        <td>Student Name</td>
        <td><input type="text" id="sname"></td>
    </tr>
    <tr>
        <td>Email</td>
        <td><input type="email" id="email"></td>
    </tr>
    <tr>
        <td>Department</td>
        <td><input type="text" id="dept"></td>
    </tr>
    <tr>
        <td>Age</td>
        <td><input type="number" id="age"></td>
    </tr>
    <tr>
        <td colspan="2">
            <button class="add-btn" onclick="saveStudent()">Save Student</button>
        </td>
    </tr>
</table>

<!-- Bottom Table - Records -->
<table id="studentTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    let students = [];
    let editIndex = -1;

    function saveStudent() {
        let id = document.getElementById("sid").value;
        let name = document.getElementById("sname").value;
        let mail = document.getElementById("email").value;
        let dept = document.getElementById("dept").value;
        let age = document.getElementById("age").value;

        if (id === "" || name === "" || mail === "" || dept === "" || age === "") {
            alert("Please fill all fields");
            return;
        }

        let student = {
            id: id,
            name: name,
            mail: mail,
            dept: dept,
            age: age
        };

        if (editIndex === -1) {
            students.push(student);
        } else {
            students[editIndex] = student;
            editIndex = -1;
        }

        clearForm();
        displayStudents();
    }

    function displayStudents() {
        let tbody = document.querySelector("#studentTable tbody");
        tbody.innerHTML = "";

        students.forEach((student, index) => {
            let row = `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.mail}</td>
                    <td>${student.dept}</td>
                    <td>${student.age}</td>
                    <td>
                        <button class="edit-btn" onclick="editStudent(${index})">
                            Edit
                        </button>
                        <button class="delete-btn" onclick="deleteStudent(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function editStudent(index) {
        document.getElementById("sid").value = students[index].id;
        document.getElementById("sname").value = students[index].name;
        document.getElementById("email").value = students[index].mail;
        document.getElementById("dept").value = students[index].dept;
        document.getElementById("age").value = students[index].age;

        editIndex = index;
    }

    function deleteStudent(index) {
        if (confirm("Are you sure you want to delete this student?")) {
            students.splice(index, 1);
            displayStudents();
        }
    }

    function clearForm() {
        document.getElementById("sid").value = "";
        document.getElementById("sname").value = "";
        document.getElementById("email").value = "";
        document.getElementById("dept").value = "";
        document.getElementById("age").value = "";
    }
</script>

</body>
</html>
